<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度探索者 | 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --text-color: #34495e;
        }

        body {
            line-height: 1.6;
            color: var(--text-color);
        }

        /* 导航栏样式 */
        .navbar {
            background: var(--primary-color);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-links {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--secondary-color);
        }

        /* 主要内容区域 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 2rem;
        }

        /* 文章卡片 */
        .article-card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .article-card:hover {
            transform: translateY(-5px);
        }

        .article-date {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        /* 侧边栏 */
        .sidebar {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 8px;
        }

        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .nav-links {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="/">首页</a>
            <div>
                <a href="#about">关于</a>
                <a href="#archives">归档</a>
                <a href="#contact">联系</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main>
            <article class="article-card">
                <small class="article-date">2024年2月20日</small>
                <h2>探索人工智能的伦理边界</h2>
                <p>随着生成式AI的快速发展，我们需要重新审视技术应用的道德框架...（文章摘要）</p>
                <a href="探索.html"class="read-more">阅读全文 →</a>
            </article>

            <article class="article-card">
                <small class="article-date">2024年2月18日</small>
                <h2>Web3.0时代的身份验证机制</h2>
                <p>去中心化身份（DID）正在改变我们对数字身份管理的认知...（文章摘要）</p>
                <a href="#" class="read-more">阅读全文 →</a>
            </article>
        </main>

        <aside class="sidebar">
            <div class="profile">
                <img src="https://via.placeholder.com/120" alt="作者头像">
                <h3>技术探索者</h3>
                <p>全栈开发者 & 技术写作者</p>
            </div>

            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>

            <div class="categories">
                <h4>文章分类</h4>
                <ul>
                    <li><a href="#">人工智能</a></li>
                    <li><a href="#">Web开发</a></li>
                    <li><a href="#">区块链</a></li>
                </ul>
            </div>
        </aside>
    </div>

    <script>
        // 简单的交互动画
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                // 实际使用时应移除preventDefault()
            });
        });

        // 滚动动画
        window.addEventListener('scroll', () => {
            const articles = document.querySelectorAll('.article-card');
            articles.forEach(article => {
                const position = article.getBoundingClientRect();
                if(position.top < window.innerHeight) {
                    article.style.opacity = '1';
                }
            });
        });
    </script>
</body>
</html>
